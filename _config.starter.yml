# Starter Theme Configuration
# 主题配置文件

# ===== 站点信息 =====
# 这些信息会覆盖 Hexo 根目录的配置
logo: # 留空则显示站点标题
favicon: /images/favicon.ico

# ===== 导航菜单 =====
menu:
  首页: /
  归档: /archives
  标签: /tags
  关于: /about

# ===== 社交链接 =====
social:
  github: # https://github.com/username
  twitter: # https://twitter.com/username
  email: mailto:xujianfeifly@163.com

# ===== 侧边栏配置 =====
sidebar:
  # 显示最新文章数量
  recent_posts: 5
  # 是否显示标签云
  show_tags: true
  # 是否显示归档
  show_archives: true

# ===== 文档系统配置 =====
# 文档目录会自动扫描 source/docs 目录
# 如果需要手动配置顺序，可以在文档的 front-matter 中设置 order 字段
# 例如: order: 1
#
# 也可以手动配置目录结构（会覆盖自动扫描）:
# docs:
#   - title: 分类名
#     children:
#       - title: 文档标题
#         path: docs/xxx.html

# ===== 文章设置 =====
post:
  # 字数统计
  word_count: true
  # 阅读时间估算
  reading_time: true
  # 每分钟阅读字数
  words_per_minute: 300
  # 显示更新时间
  show_updated: true
  # 显示版权信息
  copyright: false

# ===== 搜索配置 =====
search:
  enable: true
  # 搜索内容：title, content, tags
  fields:
    - title
    - content
    - tags
  # 搜索结果摘要长度
  excerpt_length: 100

# ===== 代码高亮 =====
highlight:
  # 显示行号
  line_number: true
  # 显示复制按钮
  copy_button: true

# ===== 图片设置 =====
images:
  # 图片懒加载
  lazyload: true
  # 图片灯箱效果
  lightbox: true

# ===== 主题外观 =====
appearance:
  # 默认主题：light / dark / auto
  default_theme: auto
  # 主题色
  primary_color: "#00CD00"
  # 是否显示主题切换按钮
  theme_toggle: true

# ===== 页脚配置 =====
footer:
  # 建站年份
  since: 2020
  # 备案信息（中国大陆）
  icp:
  # 自定义内容（支持 HTML）
  custom:

# ===== TOC 目录 =====
toc:
  enable: true
  # 最大深度
  max_depth: 3
  # 自动编号
  number: false

# ===== 评论系统 =====
# 预留评论系统配置，可根据需要启用
comments:
  enable: false
  # 支持: disqus, gitalk, utterances 等
  provider:
